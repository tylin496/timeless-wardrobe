<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#faf9f6" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#141312" />
    <title>Timeless Wardrobe</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;1,9..40,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="item-page">
    <a class="skip-link" href="#item-page-main">Skip to main content</a>
    <a class="skip-link" href="#item-detail-heading">Skip to title</a>
    <a class="skip-link" href="#item-detail-actions">Skip to actions</a>
    <a class="skip-link" href="#item-detail-root">Skip to piece</a>
    <header class="item-page-header">
      <div class="item-page-header__row">
        <a class="btn btn--ghost item-page-header__back" href="index.html" aria-label="Back">← Archive</a>
      </div>
    </header>
    <main id="item-page-main" class="item-page-main" tabindex="-1">
      <div id="item-detail-root" class="item-detail__root item-detail__root--page"></div>
    </main>
    <dialog
      id="item-image-zoom-dialog"
      class="item-image-zoom-dialog"
      aria-modal="true"
      aria-label="Enlarged product photo"
    >
      <div class="item-image-zoom-dialog__inner">
        <div class="item-image-zoom-dialog__toolbar">
          <button type="button" class="btn btn--ghost item-image-zoom-dialog__close" id="item-image-zoom-close">
            Close
          </button>
        </div>
        <div class="item-image-zoom-dialog__viewport">
          <img id="item-image-zoom-img" class="item-image-zoom-dialog__img" alt="" />
        </div>
      </div>
    </dialog>
    <p id="outfit-toast" class="outfit-toast item-page-toast" role="status" aria-live="polite"></p>
    <script src="data/wardrobe.js"></script>
    <script src="js/tw-supabase-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.4/dist/umd/supabase.js"></script>
    <script src="app.js"></script>
  </body>
</html>
