<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mobile preview · Timeless Wardrobe</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.65rem;
        padding: 0.85rem 0 0;
        background: #e5e2dc;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 11px;
        color: #5c5650;
      }
      .mobile-preview__label {
        margin: 0;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
      .mobile-preview__frame {
        width: 390px;
        max-width: calc(100vw - 1.5rem);
        height: min(844px, calc(100vh - 2.5rem));
        border: 0;
        border-radius: 24px;
        box-shadow: 0 16px 48px rgba(24, 22, 20, 0.14);
        background: #fff;
      }
    </style>
    <script>
      (function twMobilePreviewBoot() {
        const params = new URLSearchParams(globalThis.location.search);
        const path = params.get("path") || "/collection/clothing";
        const inner = new URLSearchParams(params);
        inner.delete("path");
        if (!inner.has("mobile")) inner.set("mobile", "1");
        const qs = inner.toString();
        const src = path + (qs ? "?" + qs : "");
        globalThis.addEventListener("DOMContentLoaded", () => {
          const frame = document.getElementById("tw-mobile-preview-frame");
          if (frame) frame.src = src;
        });
      })();
    </script>
  </head>
  <body>
    <p class="mobile-preview__label">Mobile preview · 390px</p>
    <iframe
      id="tw-mobile-preview-frame"
      class="mobile-preview__frame"
      title="Timeless Wardrobe — mobile layout"
    ></iframe>
  </body>
</html>
